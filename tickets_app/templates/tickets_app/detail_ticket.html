<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Tickets</title>

    <style>
        :root {
            --bg: #0b0f1f;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-strong: rgba(255, 255, 255, 0.12);
            --accent: #5df0ff;
            --accent-2: #ff8e53;
            --text: #f7f9ff;
            --muted: #c7cee4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Manrope", system-ui;
            color: var(--text);

            background: radial-gradient(110% 110% at 20% 20%, rgba(93, 240, 255, 0.18), transparent 45%),
            radial-gradient(90% 90% at 80% 0%, rgba(255, 142, 83, 0.15), transparent 40%),
            radial-gradient(120% 120% at 70% 80%, rgba(93, 240, 255, 0.12), transparent 45%),
            var(--bg);
        }

        .page {
            max-width: 800px;
            margin: auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .ticket-card {
            background: var(--panel);
            border: 1px solid var(--panel-strong);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            padding: 25px 22px;
            margin-bottom: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .35);
            transition: all .2s ease;
        }

        .ticket-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        .ticket-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--accent);
            text-align: left;
        }

        .ticket-body {
            font-size: 15px;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
            text-align: left;
        }

        .empty {
            text-align: center;
            opacity: 0.7;
            margin-top: 50px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="page">
    <h1>Tickets List</h1>

    {% for t in tickets %}
    <div class="ticket-card">
        <div class="ticket-title">{{ t.title }}</div>
        <div class="ticket-body">{{ t.body }}</div>
    </div>
    {% empty %}
    <p class="empty">There Is No Ticket !!!</p>
    {% endfor %}
</div>

</body>
</html>
