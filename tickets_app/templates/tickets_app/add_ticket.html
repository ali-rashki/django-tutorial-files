{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Send Ticket</title>

    <style>

        :root {
            --bg: #0b0f1f;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-strong: rgba(255, 255, 255, 0.12);
            --accent: #5df0ff;
            --accent-2: #ff8e53;
            --text: #f7f9ff;
            --muted: #c7cee4;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Manrope", system-ui;
            color: var(--text);

            background: radial-gradient(110% 110% at 20% 20%, rgba(93, 240, 255, 0.18), transparent 45%),
            radial-gradient(90% 90% at 80% 0%, rgba(255, 142, 83, 0.15), transparent 40%),
            radial-gradient(120% 120% at 70% 80%, rgba(93, 240, 255, 0.12), transparent 45%),
            var(--bg);
        }

        .page {
            max-width: 700px;
            margin: auto;
            padding: 40px 20px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--panel-strong);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .35);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 32px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid var(--panel-strong);
            background: rgba(255, 255, 255, .05);
            color: white;
            outline: none;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--muted);
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(93, 240, 255, .25);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all .25s ease;
        }

        .btn-primary {
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            color: #0b0f1f;
            box-shadow: 0 10px 30px rgba(93, 240, 255, .3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

    </style>
</head>

<body>

<div class="page">

    <div class="card">

        <h1>Send Ticket</h1>

        <form action="" method="post">
            {% csrf_token %}
            <input type="text" name="title" placeholder="title">

            <textarea name="body" placeholder="body"></textarea>

            <button class="btn btn-primary" type="submit">
                Submit Ticket
            </button>

        </form>

    </div>

</div>

</body>
</html>
