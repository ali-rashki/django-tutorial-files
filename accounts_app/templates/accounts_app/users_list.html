{% load static %}
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link rel="stylesheet" href="{% static "accounts_app/css/style_userlist.css" %}">
</head>
<body>
    <div class="page">
        <div class="badge">
            <span>Members</span>
            <span style="width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 18px rgba(79, 225, 245, 0.6);"></span>
            <span>Users</span>
        </div>
        <div class="hero">
            <h1>Users List </h1>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Name</th>
                        <th>Last Name </th>
                        <th>Phone Number</th>
                        <th>City</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td><span class="pill">@{{ user.username }}</span></td>
                        <td>{{ user.name }}</td>
                        <td>{{ user.lastname }}</td>
                        <td>{{ user.phone }}</td>
                        <td>{{ user.city }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" style="text-align:center; color: var(--muted);">کاربری برای نمایش وجود ندارد.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
