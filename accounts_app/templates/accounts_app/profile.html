{% load static %}
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user.name }} | Profile</title>
    <link rel="stylesheet" href="{% static "accounts_app/css/style_profile.css" %}">
</head>
<body>  
    <div class="card">
        <div class="badge">
            <span>Profile</span>
            <span style="width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 18px rgba(79, 225, 245, 0.6);"></span>
            <span>User</span>
        </div>
        <h1>{{ user.name }} {{ user.lastname }}</h1>
        <p class="subtitle">@{{ user.username }}</p>

        <div class="grid">
            <div class="item">
                <span class="label">Phone</span>
                <span class="value">{{ user.phone }}</span>
            </div>
            <div class="item">
                <span class="label">City</span>
                <span class="value">{{ user.city }}</span>
            </div>
        </div>
    </div>

</body>
</html>
